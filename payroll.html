<!DOCTYPE html>
<html>
<head>
  <title>Payroll Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  
  <p><a href="index.html">Back to Opportunity Board</a></p>

  <h1>Payroll Dashboard</h1>

  <div class="opportunity">
  <p><strong>Select Pay Period</strong></p>
  <select id="payPeriodSelect" onchange="loadPayroll()">
    <option value="">Loading pay periods...</option>
  </select>
</div>

<div id="payrollTotals"></div>

  <p><strong>Sort By</strong></p>

<select id="sortBy" onchange="loadPayroll()">
  <option value="hours">Hours (Highest First)</option>
  <option value="pay">Pay (Highest First)</option>
  <option value="sessions">Sessions (Highest First)</option>
  <option value="name">Coach Name (A-Z)</option>
</select>
  
<div id="payrollSummary">
  <p>Select a pay period to view payroll.</p>
</div>

  <script src="payroll.js"></script>

</body>
</html>
