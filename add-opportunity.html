<!DOCTYPE html>
<html>
<head>
  <title>Add Opportunity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <p><a href="manager.html">Back to Manager Dashboard</a></p>

  <h1>Add Opportunity</h1>

  <div class="opportunity">
    <p><strong>School</strong></p>
    <input id="school" placeholder="School name">

    <p><strong>Date</strong></p>
    <input id="date" type="date">

    <p><strong>Start Time</strong></p>
    <input id="startTime" type="time">

    <p><strong>End Time</strong></p>
    <input id="endTime" type="time">

    <p><strong>Coaches Needed</strong></p>
    <input id="coachesNeeded" type="number" min="1">

    <p><strong>Program Type</strong></p>
<select id="programType">
  <option value="">Select Program Type</option>
  <option value="Youth">Youth</option>
  <option value="Adult">Adult</option>
  <option value="Summer Program">Summer Program</option>
  <option value="Professional Development">Professional Development</option>
  <option value="Meeting">Meeting</option>
  <option value="Other">Other</option>
</select>

<p><strong>Fund</strong></p>
<select id="fund">
  <option value="">Select Fund</option>
  <option value="Grit">Grit</option>
  <option value="NW OH">NW OH</option>
  <option value="SW OH">SW OH</option>
</select>

    <p><strong>Notes</strong></p>
    <textarea id="notes" placeholder="Optional notes"></textarea>

    <br><br>
    <button onclick="addOpportunity()">Add Opportunity</button>
  </div>

  <script src="add-opportunity.js"></script>

</body>
</html>
